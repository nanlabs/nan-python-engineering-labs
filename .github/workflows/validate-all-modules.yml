name: Validate All Modules

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-all-modules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install data-science extras
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[data]"

      - name: Run full validation report
        id: full-validation
        shell: bash
        run: |
          python scripts/validate_all_modules.py 2>&1 | tee validation_output.txt
          true

      - name: Run CI gate
        shell: bash
        run: |
          python scripts/validate_ci_gate.py 2>&1 | tee ci_gate_output.txt

      - name: Upload validation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nan-python-engineering-labs-validate-all-modules
          path: |
            validation_output.txt
            ci_gate_output.txt

      - name: Print summary
        if: always()
        shell: bash
        run: |
          grep -E "^(✅|❌)|^SUMMARY|^Note" validation_output.txt || true
